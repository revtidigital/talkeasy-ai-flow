<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7c3aed" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Preconnect to external origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Preload LCP image with high priority -->
    <link rel="preload" as="image" href="/assets/logo.png" fetchpriority="high" />
    
    <!-- Preload fonts to avoid render-blocking -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" /></noscript>

    <!-- SEO Meta Tags -->
    <title>ConverseAI - AI Conversations That Feel Human</title>
    <meta name="description" content="ConverseAI helps businesses automate, engage, and support customers using intelligent chatbots and real-time messaging." />
    <meta name="author" content="ConverseAI" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://theconverseai.com/" />

    <!-- Open Graph -->
    <meta property="og:title" content="ConverseAI - AI Conversations That Feel Human" />
    <meta property="og:description" content="ConverseAI helps businesses automate, engage, and support customers using intelligent chatbots and real-time messaging." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://theconverseai.com/" />
    <meta property="og:image" content="https://theconverseai.com/favicon.png" />
    <meta property="og:site_name" content="ConverseAI" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ConverseAI - AI Conversations That Feel Human" />
    <meta name="twitter:description" content="ConverseAI helps businesses automate, engage, and support customers using intelligent chatbots and real-time messaging." />
    <meta name="twitter:image" content="https://theconverseai.com/favicon.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
